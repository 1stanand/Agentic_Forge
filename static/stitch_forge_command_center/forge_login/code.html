<body class="bg-background min-h-screen flex items-center justify-center relative antialiased selection:bg-primary/30 selection:text-primary">
<!-- Background Texture -->
<div class="absolute inset-0 z-0 bg-tech-pattern pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-[420px] px-md">
<!-- Glassmorphism Login Card -->
<div class="bg-surface-container/60 backdrop-blur-xl border border-surface-variant rounded-xl shadow-2xl relative overflow-hidden">
<!-- Metallic Top Edge Highlight -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
<!-- Card Content -->
<div class="p-lg">
<!-- Branding Header -->
<div class="flex flex-col items-center mb-lg pt-sm">
<img alt="Forge Logo" class="h-14 w-auto mb-md" data-alt="Sleek, minimalist 3D rendering of an industrial bronze anvil or forge symbol, isolated on dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAOXgUY47txQ6PZ6m0n1mOeejSYhBobFPsc26cuqbD71fi379ymUk_5KXskuLLTM9_AUc7APrvzNyDQ0ov9V5GvX1Un958l5NTM9QjKGtanIcJuJ6P-DATi9NzeHlYD5ArARU1s5daL9hcL5IXlel7Nxjw5IYHQiYE6-YHc9XB_xsjc9ocQqRxj7AmpkKboTgN6NGNPhynQ0v1E52qqNYvJCkRcqeoQdQHzjlGA04EuISTeH_UUtBThhHVTwTbJZJ6FZZPKN9lwtwKJ"/>
<h1 class="font-h1 text-h1 text-on-surface">Forge Workspace</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-sm text-center">Secure authentication required for laboratory access.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md">
<!-- Username Input -->
<div class="flex flex-col gap-unit">
<label class="font-mono-label text-mono-label text-on-surface-variant uppercase tracking-widest pl-1" for="username">Identifier</label>
<div class="relative flex items-center bg-surface-container-lowest border-b border-surface-variant focus-within:border-primary transition-colors">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant absolute left-3 pointer-events-none" style="font-variation-settings: 'FILL' 0;">badge</span>
<input class="w-full bg-transparent border-none outline-none text-on-surface font-mono-code text-mono-code pl-10 pr-4 py-3 placeholder-on-surface-variant/40 focus:ring-0" id="username" name="username" placeholder="sys_admin_01" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-unit">
<div class="flex justify-between items-end pl-1 pr-1">
<label class="font-mono-label text-mono-label text-on-surface-variant uppercase tracking-widest" for="password">Access Key</label>
</div>
<div class="relative flex items-center bg-surface-container-lowest border-b border-surface-variant focus-within:border-primary transition-colors">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant absolute left-3 pointer-events-none" style="font-variation-settings: 'FILL' 0;">key</span>
<input class="w-full bg-transparent border-none outline-none text-on-surface font-mono-code text-mono-code pl-10 pr-4 py-3 placeholder-on-surface-variant/40 focus:ring-0" id="password" name="password" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="mt-sm">
<button class="w-full bg-primary hover:bg-primary-fixed text-on-primary font-body-md text-body-md font-semibold py-3 rounded-DEFAULT transition-all active:scale-[0.98] flex items-center justify-center gap-2 group shadow-[0_0_15px_rgba(255,183,125,0.1)]" type="button">
<span>Initialize Session</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform" style="font-variation-settings: 'FILL' 1;">arrow_right_alt</span>
</button>
</div>
</form>
</div>
<!-- Footer / Sub-branding -->
<div class="bg-surface-container-highest/30 border-t border-surface-variant p-md flex flex-col items-center justify-center opacity-60 hover:opacity-100 transition-opacity">

<div class="w-2 h-2 rounded-full bg-primary animate-pulse shadow-[0_0_8px_rgba(255,183,125,0.6)]"></div>
<span class="font-mono-label text-mono-label uppercase tracking-wider">System Operational</span>
</div>
