optional_fields = ["reason", "amount"]
rules = [
  "Facility filter must be set before deviations load",
  "Deviation requires recommendation stage or later",
  "Deviation type must be selected from list",
]

["Documents"]
mandatory_fields = []
optional_fields = ["document_type", "document_status"]
rules = [
  "Documents must be uploaded before stage completion",
  "Mandatory documents vary by product type",
  "Each document must have a clear timestamp",
]

["KYC"]
mandatory_fields = ["kyc_status", "dedupe_result"]
optional_fields = ["kyc_update_date"]
rules = [
  "KYC must be completed before moving to next stage",
