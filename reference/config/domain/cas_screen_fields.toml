["Applicant Information"]
mandatory_fields = ["first_name", "last_name", "date_of_birth", "mobile"]
optional_fields = ["email", "alternate_mobile", "middle_name"]
rules = [
  "Primary applicant must be filled before co-applicant",
  "Date of birth must be valid",
  "Mobile number must be 10 digits",
]

["Bank Details"]
mandatory_fields = ["account_number", "ifsc_code", "account_type"]
optional_fields = ["account_holder_name"]
rules = [
  "Account number must be 9-18 digits",
  "IFSC code must be valid",
  "Account type must be selected",
]

["Deviations"]
